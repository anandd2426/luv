<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I LOVE YOU RAKSHA</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.loader{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:25px;
}

.raksha{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

svg{
    width:70px;
    height:70px;
}

.w-2{
    width:8px;
}

.dash{
    animation:
        dashArray 3s ease-in-out infinite,
        dashOffset 3s linear infinite;
}

.spin{
    animation:
        spinDashArray 2s ease-in-out infinite,
        spin 8s ease-in-out infinite,
        dashOffset 2s linear infinite;
    transform-origin:center;
}

@keyframes dashArray{
    0%{stroke-dasharray:0 1 359 0;}
    50%{stroke-dasharray:0 359 1 0;}
    100%{stroke-dasharray:359 1 0 0;}
}

@keyframes spinDashArray{
    0%{stroke-dasharray:270 90;}
    50%{stroke-dasharray:0 360;}
    100%{stroke-dasharray:270 90;}
}

@keyframes dashOffset{
    0%{stroke-dashoffset:365;}
    100%{stroke-dashoffset:5;}
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    25%{transform:rotate(270deg);}
    50%{transform:rotate(540deg);}
    75%{transform:rotate(810deg);}
    100%{transform:rotate(1080deg);}
}

/* Text */

.letter-i,
.letter-love{
    font-size:65px;
    font-weight:bold;
    background-size:300% 300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:gradientMove 4s linear infinite;
}

.letter-i{
    background-image:linear-gradient(45deg,#973BED,#007CFF);
}

.letter-love{
    background-image:linear-gradient(45deg,#FFC800,#ff00ff);
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
</style>
</head>

<body>

<div class="container">

    <!-- I LOVE YOU -->
    <div class="loader">

        <span class="letter-i">I</span>

        <div class="w-2"></div>

        <span class="letter-love">LOVE</span>

        <div class="w-2"></div>

        <!-- Y -->
        <svg viewBox="0 0 64 64">
            <defs>
                <linearGradient id="g1">
                    <stop offset="0%" stop-color="#973BED"/>
                    <stop offset="100%" stop-color="#007CFF"/>
                </linearGradient>
            </defs>

            <path
            d="M16 10 L32 30 L48 10 M32 30 V54"
            fill="none"
            stroke="url(#g1)"
            stroke-width="7"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="dash"/>
        </svg>

        <!-- O -->
        <svg viewBox="0 0 64 64">
            <defs>
                <linearGradient id="g2">
                    <stop offset="0%" stop-color="#FFC800"/>
                    <stop offset="100%" stop-color="#ff00ff"/>
                </linearGradient>
            </defs>

            <circle
            cx="32"
            cy="32"
            r="20"
            fill="none"
            stroke="url(#g2)"
            stroke-width="7"
            class="spin"/>
        </svg>

        <!-- U -->
        <svg viewBox="0 0 64 64">
            <defs>
                <linearGradient id="g3">
                    <stop offset="0%" stop-color="#00FFD5"/>
                    <stop offset="100%" stop-color="#00A2FF"/>
                </linearGradient>
            </defs>

            <path
            d="M16 10 V40 C16 55 48 55 48 40 V10"
            fill="none"
            stroke="url(#g3)"
            stroke-width="7"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="dash"/>
        </svg>

    </div>

    <!-- RAKSHA -->
    <div class="raksha">

        <!-- R -->
        <svg viewBox="0 0 64 64">
            <defs>
                <linearGradient id="b">
                    <stop offset="0%" stop-color="#ff4d4d"/>
                    <stop offset="100%" stop-color="#ffcc00"/>
                </linearGradient>
            </defs>

            <path
            d="M18,56 V8 h16 a12,12 0 0 1 0,24 H18 M30,32 L46,56"
            fill="none"
            stroke="url(#b)"
            stroke-width="7"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="dash"/>
        </svg>

        <!-- A -->
        <svg viewBox="0 0 64 64">
            <defs>
                <linearGradient id="c">
                    <stop offset="0%" stop-color="#00e5ff"/>
                    <stop offset="100%" stop-color="#008cff"/>
                </linearGradient>
            </defs>

            <path
            d="M14,56 L32,8 L50,56 M21,38 H43"
            fill="none"
            stroke="url(#c)"
            stroke-width="7"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="dash"/>
        </svg>

        <!-- K -->
        <svg viewBox="0 0 64 64">
            <defs>
                <linearGradient id="d">
                    <stop offset="0%" stop-color="#ff00ff"/>
                    <stop offset="100%" stop-color="#973BED"/>
                </linearGradient>
            </defs>

            <path
            d="M18,8 V56 M46,8 L18,32 L46,56"
            fill="none"
            stroke="url(#d)"
            stroke-width="7"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="dash"/>
        </svg>

        <!-- S -->
        <svg viewBox="0 0 64 64">
            <path
            d="M46,14 C40,6 20,6 18,18 C16,34 48,30 46,46 C44,58 24,58 18,50"
            fill="none"
            stroke="url(#b)"
            stroke-width="7"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="dash"/>
        </svg>

        <!-- H -->
        <svg viewBox="0 0 64 64">
            <path
            d="M18,8 V56 M46,8 V56 M18,32 H46"
            fill="none"
            stroke="url(#c)"
            stroke-width="7"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="dash"/>
        </svg>

        <!-- A -->
        <svg viewBox="0 0 64 64">
            <path
            d="M14,56 L32,8 L50,56 M21,38 H43"
            fill="none"
            stroke="url(#d)"
            stroke-width="7"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="dash"/>
        </svg>

    </div>

</div>

</body>
</html>
